name: Auto Update

on:
  schedule:
    - cron: "0 8 * * *"   # 台灣 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install packages
      run: pip install -r requirements.txt

    # ⭐ 新增：先產生 cap.csv（關鍵）
    - name: Update cap
      run: python update_cap.py

    # ⭐ 再跑借券
    - name: Run borrow
      run: python borrow.py

    - name: Commit & Push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add index.html cap.csv
        git diff --cached --quiet || git commit -m "update data"
        git push
